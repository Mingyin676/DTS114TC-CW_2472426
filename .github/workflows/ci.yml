name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Code style ─────────────────────────────────────────────────────
  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python source files
        run: |
          python -m flake8 CW/utils.py --max-line-length=120 --ignore=E501,W503,E402 --statistics || true

      - name: Markdown lint
        run: |
          npx --yes markdownlint-cli@0.44.0 README.md --disable MD013 MD033 MD041 || echo "⚠️  Markdown issues found (non-blocking)"

  # ── Job 2: Security scan ──────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for potential secrets in source files..."
          SECRET_PATTERNS='(api_key\s*=|API_KEY\s*=|api\.key\s*=|secret\s*=|password\s*=|token\s*=|Authorization\s*:)'
          FOUND=$(grep -rInE "$SECRET_PATTERNS" \
            --include='*.py' --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.json' \
            --exclude-dir='__pycache__' --exclude-dir='artifacts' --exclude-dir='.git' --exclude='.env' \
            . 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "⚠️  Possible secrets found (review each):"
            echo "$FOUND" | head -20
          else
            echo "✅ No obvious secrets detected in source files"
          fi

  # ── Job 3: Notebook structure ─────────────────────────────────────────────
  notebook-structure:
    name: Notebook Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify notebook is valid JSON
        run: |
          python -c "
          import json
          with open('CW/Generator.ipynb', 'r', encoding='utf-8') as f:
              nb = json.load(f)
          cells = nb.get('cells', [])
          code_cells = [c for c in cells if c.get('cell_type') == 'code']
          md_cells = [c for c in cells if c.get('cell_type') == 'markdown']
          print(f'✅ Notebook valid: {len(cells)} cells ({len(code_cells)} code, {len(md_cells)} markdown)')
          assert len(code_cells) > 0, 'No code cells found'
          assert len(md_cells) > 0, 'No markdown cells found'
          "

      - name: Check cell structure
        run: |
          python -c "
          import json
          with open('CW/Generator.ipynb', 'r', encoding='utf-8') as f:
              nb = json.load(f)
          cells = nb.get('cells', [])
          required_phases = ['Inception', 'Construction', 'Operation']
          all_md = '\n'.join([''.join(c.get('source', [])) for c in cells])
          missing = [p for p in required_phases if p not in all_md]
          if missing:
              print(f'⚠️  Warning: Phase headers not found: {missing}')
          else:
              print('✅ All required phase headers found')
          "

      - name: Check notebook completeness (executed cells)
        run: |
          python -c "
          import json
          with open('CW/Generator.ipynb', 'r', encoding='utf-8') as f:
              nb = json.load(f)
          cells = nb.get('cells', [])
          code_cells = [c for c in cells if c.get('cell_type') == 'code']
          executed = [c for c in code_cells if c.get('execution_count') is not None]
          empty = [c for c in code_cells if c.get('execution_count') is None and c.get('source') and ''.join(c.get('source', [])).strip()]
          print(f'✅ {len(code_cells)} code cells total, {len(executed)} executed')
          if empty:
              print(f'⚠️  {len(empty)} code cells have source but no output (may not have been run):')
              for i, c in enumerate(empty):
                  first_line = ''.join(c.get('source', [])).strip().split('\n')[0][:60]
                  print(f'    Cell #{cells.index(c)}: {first_line}...')
          else:
              print('✅ All code cells have been executed')
          "

  # ── Job 4: Environment & imports ──────────────────────────────────────────
  environment:
    name: Environment & Imports
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: ai_in_se_cw.yml
          activate-environment: ai_in_se_cw
          python-version: '3.10'
          auto-activate-base: false
          miniforge-version: latest
          conda-solver: libmamba

      - name: Import smoke test
        run: |
          python -c "
          from CW.utils import get_completion, load_environment, render_plantuml_diagram, setup_llm_client, clean_llm_output
          print('✅ All CW.utils imports resolved successfully')
          "

      - name: Verify conda env export
        run: |
          conda env export -n ai_in_se_cw --no-builds > /tmp/env_check.yml
          echo "✅ Conda environment exportable"
